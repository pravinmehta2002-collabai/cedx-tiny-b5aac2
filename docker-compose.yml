services:
  cedx:
    build: .
    image: cedx-tiny-b5aac2:latest
    container_name: cedx-tiny
    environment:
      CASE_ID: CEDX-B5AAC2
      SEED_DIR: /app/seed
      OUT_DIR: /app/out
      REPLAY_LLM: "true"
      PIPELINE_VERSION: "0.1.0-tracer"
    volumes:
      # Mount seed read-only (do not edit)
      - ./seed:/app/seed:ro
      # Mount out for inspecting artifacts on host
      - ./out:/app/out
      # Mount transcripts (used in REPLAY mode)
      - ./transcripts:/app/transcripts:ro
    command: make demo
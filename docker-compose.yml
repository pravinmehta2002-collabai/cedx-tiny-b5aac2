services:
  cedx:
    build: .
    image: cedx-tiny-b5aac2:latest
    container_name: cedx-tiny
    environment:
      CASE_ID: CEDX-B5AAC2
      SEED_DIR: /app/seed
      OUT_DIR: /app/out
      REPLAY_LLM: "true"
      PIPELINE_VERSION: "0.4.0-step4"
    volumes:
      - ./seed:/app/seed:ro
      - ./out:/app/out
      - ./transcripts:/app/transcripts:ro
    command: python -m pipeline.run